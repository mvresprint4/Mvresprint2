name: RTS Verification Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup update stable

      - name: Install Kani
        run: cargo install kani-verifier

      - name: Build workspace
        run: cargo build --workspace

      - name: Generate verification artifacts
        run: cargo run -p verification_engine -- compile rts_kani_vir.json

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run Kani proofs
        run: cargo kani --workspace
